openapi: 3.0.0
info:
  title: Product API
  description: API quản lý sản phẩm - CRUD Operations với MongoDB
  version: 1.0.0
servers:
  - url: http://localhost:5000
    description: Local development server

paths:
  /api/v1/products:
    get:
      summary: Lấy danh sách sản phẩm
      tags:
        - Products
      parameters:
        - name: page
          in: query
          required: false
          description: Số trang (mặc định 1)
          schema:
            type: integer
            default: 1
        - name: limit
          in: query
          required: false
          description: Số sản phẩm mỗi trang (mặc định 10)
          schema:
            type: integer
            default: 10
      responses:
        "200":
          description: Lấy danh sách sản phẩm thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

    post:
      summary: Tạo sản phẩm mới
      tags:
        - Products
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
            example:
              name: "Laptop Dell XPS 15"
              description: "Laptop cao cấp dành cho lập trình viên"
              price: 35000000
              category: "Electronics"
              stock: 50
              imageUrl: "https://example.com/laptop.jpg"
      responses:
        "201":
          description: Tạo sản phẩm thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "400":
          description: Dữ liệu không hợp lệ
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/v1/products/search:
    get:
      summary: Tìm kiếm sản phẩm
      tags:
        - Products
      parameters:
        - name: name
          in: query
          required: false
          description: Tìm kiếm theo tên sản phẩm
          schema:
            type: string
        - name: category
          in: query
          required: false
          description: Lọc theo danh mục
          schema:
            type: string
        - name: minPrice
          in: query
          required: false
          description: Giá tối thiểu
          schema:
            type: number
        - name: maxPrice
          in: query
          required: false
          description: Giá tối đa
          schema:
            type: number
      responses:
        "200":
          description: Tìm kiếm thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductListResponse"

  /api/v1/products/{product_id}:
    get:
      summary: Lấy thông tin sản phẩm theo ID
      tags:
        - Products
      parameters:
        - name: product_id
          in: path
          required: true
          description: MongoDB ObjectId của sản phẩm
          schema:
            type: string
      responses:
        "200":
          description: Lấy thông tin sản phẩm thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Không tìm thấy sản phẩm
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    put:
      summary: Cập nhật toàn bộ thông tin sản phẩm
      tags:
        - Products
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProductRequest"
      responses:
        "200":
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Không tìm thấy sản phẩm

    patch:
      summary: Cập nhật một phần thông tin sản phẩm
      tags:
        - Products
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProductRequest"
      responses:
        "200":
          description: Cập nhật thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ProductResponse"
        "404":
          description: Không tìm thấy sản phẩm

    delete:
      summary: Xóa sản phẩm
      tags:
        - Products
      parameters:
        - name: product_id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Xóa sản phẩm thành công
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/MessageResponse"
        "404":
          description: Không tìm thấy sản phẩm

components:
  schemas:
    Product:
      type: object
      properties:
        _id:
          type: string
          description: MongoDB ObjectId
          example: "64f1b2c3d4e5f6a7b8c9d0e1"
        name:
          type: string
          example: "Laptop Dell XPS 15"
        description:
          type: string
          example: "Laptop cao cấp dành cho lập trình viên"
        price:
          type: number
          format: float
          example: 35000000
        category:
          type: string
          example: "Electronics"
        stock:
          type: integer
          example: 50
        imageUrl:
          type: string
          example: "https://example.com/laptop.jpg"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateProductRequest:
      type: object
      required:
        - name
        - price
        - category
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        stock:
          type: integer
          default: 0
        imageUrl:
          type: string

    UpdateProductRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        price:
          type: number
        category:
          type: string
        stock:
          type: integer
        imageUrl:
          type: string

    ProductResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          $ref: "#/components/schemas/Product"
        message:
          type: string
          example: "Thao tác thành công"

    ProductListResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: array
          items:
            $ref: "#/components/schemas/Product"
        total:
          type: integer
          example: 100
        page:
          type: integer
          example: 1
        limit:
          type: integer
          example: 10
        message:
          type: string

    MessageResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
          example: "Lỗi xảy ra"
        error:
          type: string
