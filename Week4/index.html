<!DOCTYPE html>
<html>
<head>
  <title>Swagger UI</title>
  <link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist/swagger-ui.css" />
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
    }

    .toolbar {
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 12px;
      border-bottom: 1px solid #ddd;
      background: #f8f9fb;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .toolbar input {
      flex: 1;
      min-width: 220px;
      padding: 8px 10px;
      border: 1px solid #c9ced6;
      border-radius: 6px;
      font-size: 14px;
    }

    .toolbar button {
      padding: 8px 12px;
      border: 1px solid #c9ced6;
      background: #fff;
      border-radius: 6px;
      cursor: pointer;
      font-size: 14px;
    }

    .toolbar button:hover {
      background: #eef2f7;
    }
  </style>
</head>
<body>
  <div class="toolbar">
    <input id="spec-url" type="text" placeholder="Nhap URL file OpenAPI (yaml/json)" />
    <button id="load-btn" type="button">Load</button>
    <button id="share-btn" type="button">Copy link chia se</button>
  </div>

  <div id="swagger-ui"></div>

  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-bundle.js"></script>
  <script src="https://unpkg.com/swagger-ui-dist/swagger-ui-standalone-preset.js"></script>
  <script>
    (function () {
      var defaultSpecUrl = "swagger.yaml";
      var urlParams = new URLSearchParams(window.location.search);
      var specUrlFromQuery = urlParams.get("url");
      var specInput = document.getElementById("spec-url");
      var loadBtn = document.getElementById("load-btn");
      var shareBtn = document.getElementById("share-btn");
      var ui = null;

      function renderSwagger(specUrl) {
        ui = SwaggerUIBundle({
          url: specUrl,
          dom_id: "#swagger-ui",
          presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],
          layout: "BaseLayout"
        });
      }

      function updateQueryWithoutReload(specUrl) {
        var next = new URL(window.location.href);
        next.searchParams.set("url", specUrl);
        window.history.replaceState({}, "", next.toString());
      }

      function getShareableLink(specUrl) {
        var share = new URL(window.location.href);
        share.searchParams.set("url", specUrl);
        return share.toString();
      }

      function loadFromInput() {
        var specUrl = specInput.value.trim();
        if (!specUrl) {
          return;
        }
        updateQueryWithoutReload(specUrl);
        renderSwagger(specUrl);
      }

      function copyShareLink() {
        var specUrl = specInput.value.trim();
        if (!specUrl) {
          alert("Vui long nhap URL OpenAPI truoc khi chia se.");
          return;
        }

        var shareableLink = getShareableLink(specUrl);
        navigator.clipboard.writeText(shareableLink)
          .then(function () {
            alert("Da copy link chia se.");
          })
          .catch(function () {
            alert("Khong the copy tu dong. Link: " + shareableLink);
          });
      }

      var firstSpecUrl = specUrlFromQuery || defaultSpecUrl;
      specInput.value = firstSpecUrl;
      renderSwagger(firstSpecUrl);

      loadBtn.addEventListener("click", loadFromInput);
      shareBtn.addEventListener("click", copyShareLink);
      specInput.addEventListener("keydown", function (event) {
        if (event.key === "Enter") {
          loadFromInput();
        }
      });
    })();
  </script>
</body>
</html>
